<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Projeto Abnova</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #121212;
    color: white;
}
.container {
    background: #1e1e1e;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 400px;
    border: 1px solid #333;
}
h2 {
    text-align: center;
    color: #3ecf8e;
    margin-bottom: 20px;
}
label {
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
    color: #aaa;
}
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #2a2a2a;
    color: white;
    box-sizing: border-box;
    font-size: 16px;
}
input:focus, select:focus {
    border-color: #3ecf8e;
    outline: none;
}
button {
    width: 100%;
    padding: 12px;
    background: #3ecf8e;
    color: #121212;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}
button:hover {
    background: #34b27b;
}
.footer-logo {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">
<h2>Cadastro de Pessoas</h2>

<form id="formCadastro">
<label>Nome Completo</label>
<input type="text" id="nome" placeholder="Ex: João Silva" required>

<label>Grupo / Disponibilidade</label>
<select id="grupo">
<option value="Manhã">Disponível - Manhã</option>
<option value="Tarde">Disponível - Tarde</option>
<option value="Noite">Disponível - Noite</option>
<option value="Integral">Período Integral</option>
</select>

<button type="submit" id="btnEnviar">Finalizar Cadastro</button>
</form>

<div class="footer-logo">Projeto Abnova</div>
</div>

<script>

// CONFIGURAÇÃO DO SUPABASE (CORRIGIDA)
const SUPABASE_URL = "https://yzxnjkndwfpgokskyhst.supabase.co";
const SUPABASE_KEY = "sb_publishable_dzzN_Bl8E29SHWzL9RwnqA_T9nuRrM1";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LÓGICA DE ENVIO
const form = document.getElementById("formCadastro");
const btn = document.getElementById("btnEnviar");

form.addEventListener("submit", async (e) => {

e.preventDefault();

btn.disabled = true;
btn.innerText = "Enviando...";

const nome = document.getElementById("nome").value;
const grupo = document.getElementById("grupo").value;

try {

const { data, error } = await supabaseClient
.from("pessoas")
.insert([
{ nome: nome, grupo: grupo }
]);

if (error) throw error;

alert("✅ Cadastro salvo com sucesso!");
form.reset();

} catch (err) {

console.error(err);
alert("❌ Erro ao salvar: " + err.message);

} finally {

btn.disabled = false;
btn.innerText = "Finalizar Cadastro";

}

});

</script>

</body>
</html>
